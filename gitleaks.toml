title = "mtmpg public-readiness policy"

[extend]
useDefault = true

[[allowlists]]
description = "Deterministic synthetic private-key sentinel used only to prove the public-readiness gate; it is not credential material."
condition = "AND"
targetRules = ["private-key"]
regexTarget = "match"
paths = ['''(?:^|/)tests/fixtures/public-readiness/synthetic-private-key\.pem$''']
regexes = ['''(?s)^-----BEGIN PRIVATE KEY-----\r?\nbXRtcGctcHVibGljLXJlYWRpbmVzcy1zeW50aGV0aWMtc2VudGluZWw=\r?\n-----END PRIVATE KEY-----\r?\n?$''']

[[allowlists]]
description = "Immutable historical artifact-gate test literal that rejects private-key markers; the commit contains no PEM key material."
condition = "AND"
targetRules = ["private-key"]
commits = ["0563a822817c107cfb078b501002c035e8b42ee8"]
regexTarget = "match"
paths = ['''^tests/production_capability_gate\.rs$''']
regexes = ['''(?s)-----begin private key-----.*fn artifact_string_violations\(strings: &str\).*fallback_issuer\\nintrospection_endpoint\\n-----BEGIN PRIVATE KEY-----''']

[[allowlists]]
description = "Public PostgreSQL 18.4 OAuth header digest used by the historical Native CI script; it is not credential material."
condition = "AND"
targetRules = ["generic-api-key"]
regexTarget = "match"
paths = ['''(?:^|/)scripts/native-test$''']
regexes = ['''OAUTH_HEADER_SHA256\s*=\s*"be015ae68deef28a906c8739bc653ca90a4c6966c10f0efd3bd926efb4958bcf"''']
