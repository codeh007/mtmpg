name: Native CI

on:
  push:
    branches:
      - main
      - issue-116-extract-pggomtm
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_SUMMARY: "true"

jobs:
  native-authority:
    name: Native authority
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify clean source identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and verify the native authority graph
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          pull: true
          push: false
          load: false
          provenance: false
          sbom: false
          tags: mtmpg-native-ci:${{ github.sha }}
          cache-from: type=gha,scope=mtmpg-native-ci
          cache-to: type=gha,mode=max,scope=mtmpg-native-ci
