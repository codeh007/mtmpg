name: Native CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  PGRX_PG_CONFIG_PATH: /usr/lib/postgresql/18/bin/pg_config

jobs:
  verify:
    name: Resolve, test and build candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify source identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain)"

      - name: Scan source and history for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install current PG18 development tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            ca-certificates \
            clang \
            curl \
            gnupg \
            jq \
            libclang-dev \
            libkrb5-dev \
            libssl-dev \
            pkg-config \
            shellcheck \
            skopeo
          curl --fail --location --proto '=https' --tlsv1.2 \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor --batch --yes \
                --output /usr/share/keyrings/postgresql.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            postgresql-client-18 \
            postgresql-server-dev-18

      - name: Resolve latest-compatible inputs once
        shell: bash
        run: |
          set -euo pipefail
          rustup set profile minimal
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy rustfmt
          cargo generate-lockfile

          docker pull rust:bookworm >/dev/null
          docker pull postgres:18-bookworm >/dev/null
          rust_image="$(docker image inspect --format '{{ index .RepoDigests 0 }}' rust:bookworm)"
          postgres_image="$(docker image inspect --format '{{ index .RepoDigests 0 }}' postgres:18-bookworm)"
          host_rust="$(rustc --version)"
          image_rust="$(docker run --rm --entrypoint rustc "$rust_image" --version)"
          test "$host_rust" = "$image_rust"

          host_postgres="$("$PGRX_PG_CONFIG_PATH" --version)"
          image_postgres="$(docker run --rm "$postgres_image" postgres --version)"
          host_minor="$(grep --only-matching --extended-regexp '18\.[0-9]+' <<<"$host_postgres" | head -n 1)"
          image_minor="$(grep --only-matching --extended-regexp '18\.[0-9]+' <<<"$image_postgres" | head -n 1)"
          test -n "$host_minor"
          test "$host_minor" = "$image_minor"

          base_version="$(cargo metadata --locked --no-deps --format-version 1 | jq --raw-output '.packages[0].version')"
          candidate_version="${base_version}-rc.${GITHUB_RUN_ID}"
          lock_sha256="$(sha256sum Cargo.lock | cut -d' ' -f1)"
          header_sha256="$(sha256sum "$($PGRX_PG_CONFIG_PATH --includedir-server)/libpq/oauth.h" | cut -d' ' -f1)"
          pgrx_version="$(cargo metadata --locked --format-version 1 | jq --raw-output '.packages[] | select(.name == "pgrx") | .version' | head -n 1)"

          jq --null-input \
            --arg source "$GITHUB_SHA" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg version "$candidate_version" \
            --arg rust "$host_rust" \
            --arg cargo "$(cargo --version)" \
            --arg pgrx "$pgrx_version" \
            --arg postgres "$host_minor" \
            --arg pg_config "$host_postgres" \
            --arg rust_image "$rust_image" \
            --arg postgres_image "$postgres_image" \
            --arg lock_sha256 "$lock_sha256" \
            --arg header_sha256 "$header_sha256" \
            '{
              schema: "mtmpg-resolved-inputs/v1",
              source: $source,
              workflow: {run_id: $run_id, run_attempt: $run_attempt},
              version: $version,
              rust: {compiler: $rust, cargo: $cargo, builder: $rust_image},
              pgrx: $pgrx,
              postgresql: {minor: $postgres, pg_config: $pg_config, runtime: $postgres_image, oauth_header_sha256: $header_sha256},
              cargo_lock_sha256: $lock_sha256
            }' >resolved-inputs.json

          {
            echo "RUST_IMAGE=$rust_image"
            echo "POSTGRES_IMAGE=$postgres_image"
            echo "POSTGRES_MINOR=$host_minor"
            echo "CANDIDATE_VERSION=$candidate_version"
          } >>"$GITHUB_ENV"

      - name: Audit dependencies and licenses
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --locked --no-default-features --features pg18
          command-arguments: --show-stats advisories licenses bans sources

      - name: Verify shell and generated ABI
        shell: bash
        run: |
          set -euo pipefail
          shellcheck tests/*.sh
          include_dir="$($PGRX_PG_CONFIG_PATH --includedir-server)"
          read -r -a cppflags <<<"$($PGRX_PG_CONFIG_PATH --cppflags)"
          cc -std=c11 -Wall -Wextra -Werror \
            "${cppflags[@]}" \
            -I"$include_dir" \
            tests/oauth_layout_probe.c \
            -o "$RUNNER_TEMP/pggomtm-oauth-layout-probe"
          "$RUNNER_TEMP/pggomtm-oauth-layout-probe"

      - name: Run Rust quality and domain tests
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo clippy --locked --all-targets --no-default-features \
            --features pg18,abi-gate,pgx-oauth-gate -- -D warnings
          cargo clippy --locked --lib --no-default-features \
            --features pg18,abi-runtime-gate -- -D warnings
          cargo clippy --locked --lib --no-default-features \
            --features pg18 -- -D warnings
          cargo test --locked --no-default-features --features pg18,abi-gate
          cargo test --locked --no-default-features \
            --features pg18,abi-gate,pgx-oauth-gate \
            --test pgx_oauth_gate

      - name: Stage and run real PG18 matrices
        shell: bash
        env:
          PGGOMTM_POSTGRES_IMAGE: ${{ env.POSTGRES_IMAGE }}
        run: |
          set -euo pipefail
          tests/stage-integration.sh "$CARGO_TARGET_DIR/native-integration"
          tests/postgres_integration.sh run "$CARGO_TARGET_DIR/native-integration"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production OCI archive once
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          pull: true
          push: false
          provenance: false
          sbom: false
          outputs: type=oci,dest=${{ runner.temp }}/mtmpg-postgres.oci.tar
          build-args: |
            RUST_IMAGE=${{ env.RUST_IMAGE }}
            POSTGRES_IMAGE=${{ env.POSTGRES_IMAGE }}
            POSTGRES_MINOR=${{ env.POSTGRES_MINOR }}
            SOURCE_REVISION=${{ github.sha }}
            VERSION=${{ env.CANDIDATE_VERSION }}
          cache-from: type=gha,scope=mtmpg-native-ci
          cache-to: type=gha,mode=max,scope=mtmpg-native-ci

      - name: Verify the exact production image
        shell: bash
        run: |
          set -euo pipefail
          skopeo copy \
            "oci-archive:$RUNNER_TEMP/mtmpg-postgres.oci.tar" \
            "docker-daemon:mtmpg-native-ci:$GITHUB_SHA"
          tests/image-readiness.sh \
            "mtmpg-native-ci:$GITHUB_SHA" \
            "$GITHUB_SHA" \
            "$CANDIDATE_VERSION" \
            "$CARGO_TARGET_DIR/native-integration"

          container_id="$(docker create "mtmpg-native-ci:$GITHUB_SHA")"
          docker cp \
            "$container_id:/usr/lib/postgresql/18/lib/pggomtm.so" \
            "$RUNNER_TEMP/pggomtm.so"
          docker rm "$container_id" >/dev/null
          jq --null-input \
            --arg source "$GITHUB_SHA" \
            --arg version "$CANDIDATE_VERSION" \
            --arg resolved_inputs_sha256 "$(sha256sum resolved-inputs.json | cut -d' ' -f1)" \
            --arg cargo_lock_sha256 "$(sha256sum Cargo.lock | cut -d' ' -f1)" \
            --arg module_sha256 "$(sha256sum "$RUNNER_TEMP/pggomtm.so" | cut -d' ' -f1)" \
            --arg oci_archive_sha256 "$(sha256sum "$RUNNER_TEMP/mtmpg-postgres.oci.tar" | cut -d' ' -f1)" \
            --arg oci_manifest_digest "$(skopeo inspect --format '{{.Digest}}' "oci-archive:$RUNNER_TEMP/mtmpg-postgres.oci.tar")" \
            '{
              schema: "mtmpg-verified-candidate/v1",
              source: $source,
              version: $version,
              resolved_inputs_sha256: $resolved_inputs_sha256,
              cargo_lock_sha256: $cargo_lock_sha256,
              module_sha256: $module_sha256,
              oci_archive_sha256: $oci_archive_sha256,
              oci_manifest_digest: $oci_manifest_digest
            }' >candidate-metadata.json

          material_root="$RUNNER_TEMP/candidate-materials"
          install -d -m 0755 "$material_root"
          install -m 0644 \
            Cargo.lock \
            resolved-inputs.json \
            candidate-metadata.json \
            "$material_root"
          mv "$RUNNER_TEMP/mtmpg-postgres.oci.tar" "$material_root/"
          chmod 0644 "$material_root/mtmpg-postgres.oci.tar"

      - name: Upload verified candidate materials
        uses: actions/upload-artifact@v7
        with:
          name: mtmpg-candidate-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/candidate-materials/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish-candidate:
    name: Publish verified SemVer candidate
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'codeh007/mtmpg'
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Download verified candidate materials
        uses: actions/download-artifact@v8
        with:
          name: mtmpg-candidate-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/candidate-materials

      - name: Install registry inspection tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            ca-certificates \
            jq \
            skopeo

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve current ORAS client
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          oras_tag="$(gh api /repos/oras-project/oras/releases/latest --jq '.tag_name')"
          [[ "$oras_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          oras_reference="ghcr.io/oras-project/oras:$oras_tag"
          docker pull "$oras_reference" >/dev/null
          oras_image="$(docker image inspect \
            --format '{{ index .RepoDigests 0 }}' \
            "$oras_reference")"
          [[ "$oras_image" =~ ^ghcr\.io/oras-project/oras@sha256:[0-9a-f]{64}$ ]]
          oras_version="$(docker run --rm "$oras_image" version | awk '/^Version:/ {print $2}')"
          test -n "$oras_version"
          {
            echo "ORAS_IMAGE=$oras_image"
            echo "ORAS_VERSION=$oras_version"
          } >>"$GITHUB_ENV"

      - name: Verify and publish the immutable candidate
        shell: bash
        env:
          IMAGE_REPOSITORY: ghcr.io/codeh007/mtmpg-postgres
        run: |
          set -euo pipefail
          material_root="$RUNNER_TEMP/candidate-materials"
          oci_archive="$material_root/mtmpg-postgres.oci.tar"
          auth_file="$HOME/.docker/config.json"
          for required in \
            Cargo.lock \
            resolved-inputs.json \
            candidate-metadata.json \
            mtmpg-postgres.oci.tar; do
            test -f "$material_root/$required"
          done
          test -f "$auth_file"

          candidate_version="$(jq --raw-output '.version' "$material_root/candidate-metadata.json")"
          test "$(jq --raw-output '.source' "$material_root/candidate-metadata.json")" = "$GITHUB_SHA"
          test "$(jq --raw-output '.source' "$material_root/resolved-inputs.json")" = "$GITHUB_SHA"
          test "$(jq --raw-output '.version' "$material_root/resolved-inputs.json")" = "$candidate_version"
          test "$(jq --raw-output '.workflow.run_id' "$material_root/resolved-inputs.json")" = "$GITHUB_RUN_ID"
          test "$(jq --raw-output '.workflow.run_attempt' "$material_root/resolved-inputs.json")" = "$GITHUB_RUN_ATTEMPT"
          [[ "$candidate_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.${GITHUB_RUN_ID}$ ]]

          cargo_lock_sha256="$(sha256sum "$material_root/Cargo.lock" | cut -d' ' -f1)"
          resolved_inputs_sha256="$(sha256sum "$material_root/resolved-inputs.json" | cut -d' ' -f1)"
          oci_archive_sha256="$(sha256sum "$oci_archive" | cut -d' ' -f1)"
          test "$cargo_lock_sha256" = "$(jq --raw-output '.cargo_lock_sha256' "$material_root/resolved-inputs.json")"
          test "$cargo_lock_sha256" = "$(jq --raw-output '.cargo_lock_sha256' "$material_root/candidate-metadata.json")"
          test "$resolved_inputs_sha256" = "$(jq --raw-output '.resolved_inputs_sha256' "$material_root/candidate-metadata.json")"
          test "$oci_archive_sha256" = "$(jq --raw-output '.oci_archive_sha256' "$material_root/candidate-metadata.json")"

          archive_manifest_digest="$(skopeo inspect --format '{{.Digest}}' "oci-archive:$oci_archive")"
          test "$archive_manifest_digest" = "$(jq --raw-output '.oci_manifest_digest' "$material_root/candidate-metadata.json")"
          target_reference="$IMAGE_REPOSITORY:$candidate_version"
          evidence_reference="$IMAGE_REPOSITORY:$candidate_version.evidence"
          if skopeo inspect --authfile "$auth_file" "docker://$target_reference" >/dev/null 2>&1; then
            echo "candidate version already exists: $candidate_version" >&2
            exit 1
          fi
          if skopeo inspect --raw --authfile "$auth_file" "docker://$evidence_reference" >/dev/null 2>&1; then
            echo "candidate evidence already exists: $candidate_version" >&2
            exit 1
          fi

          digest_file="$RUNNER_TEMP/registry-digest.txt"
          skopeo copy \
            --authfile "$auth_file" \
            --preserve-digests \
            --digestfile "$digest_file" \
            "oci-archive:$oci_archive" \
            "docker://$target_reference"
          registry_digest="$(tr -d '\n' <"$digest_file")"
          [[ "$registry_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "$registry_digest" = "$archive_manifest_digest"
          test "$(skopeo inspect --authfile "$auth_file" --format '{{.Digest}}' "docker://$target_reference")" = "$registry_digest"

          {
            echo "CANDIDATE_VERSION=$candidate_version"
            echo "EVIDENCE_REFERENCE=$evidence_reference"
            echo "EVIDENCE_ROOT=$RUNNER_TEMP/candidate-evidence"
            echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY"
            echo "MATERIAL_ROOT=$material_root"
            echo "REGISTRY_DIGEST=$registry_digest"
          } >>"$GITHUB_ENV"

      - name: Download current Syft
        id: syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate release manifest and SBOM from the verified archive
        shell: bash
        env:
          SYFT_BIN: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          install -d -m 0755 "$EVIDENCE_ROOT"
          install -m 0644 \
            "$MATERIAL_ROOT/Cargo.lock" \
            "$MATERIAL_ROOT/resolved-inputs.json" \
            "$MATERIAL_ROOT/candidate-metadata.json" \
            "$EVIDENCE_ROOT"

          "$SYFT_BIN" \
            "oci-archive:$MATERIAL_ROOT/mtmpg-postgres.oci.tar" \
            --output "spdx-json=$EVIDENCE_ROOT/sbom.spdx.json"
          jq --exit-status \
            '(.spdxVersion | startswith("SPDX-")) and ((.packages // []) | length > 0)' \
            "$EVIDENCE_ROOT/sbom.spdx.json" >/dev/null
          syft_version="$("$SYFT_BIN" version -o json | jq --raw-output '.version')"
          skopeo_version="$(skopeo --version)"
          sbom_sha256="$(sha256sum "$EVIDENCE_ROOT/sbom.spdx.json" | cut -d' ' -f1)"

          jq --null-input \
            --slurpfile resolved "$MATERIAL_ROOT/resolved-inputs.json" \
            --slurpfile candidate "$MATERIAL_ROOT/candidate-metadata.json" \
            --arg image_repository "$IMAGE_REPOSITORY" \
            --arg registry_digest "$REGISTRY_DIGEST" \
            --arg sbom_sha256 "$sbom_sha256" \
            --arg oras "$ORAS_VERSION" \
            --arg oras_image "$ORAS_IMAGE" \
            --arg skopeo "$skopeo_version" \
            --arg syft "$syft_version" \
            '{
              schema: "mtmpg-release-manifest/v1",
              version: $candidate[0].version,
              source: $candidate[0].source,
              workflow: $resolved[0].workflow,
              cargo_lock_sha256: $candidate[0].cargo_lock_sha256,
              resolved_inputs_sha256: $candidate[0].resolved_inputs_sha256,
              rust: $resolved[0].rust,
              pgrx: $resolved[0].pgrx,
              postgresql: $resolved[0].postgresql,
              module: {
                path: "/usr/lib/postgresql/18/lib/pggomtm.so",
                sha256: $candidate[0].module_sha256
              },
              oci: {
                archive_sha256: $candidate[0].oci_archive_sha256,
                manifest_digest: $candidate[0].oci_manifest_digest,
                repository: $image_repository,
                reference: ($image_repository + ":" + $candidate[0].version),
                registry_digest: $registry_digest
              },
              sbom: {format: "spdx-json", sha256: $sbom_sha256},
              tooling: {
                oras: $oras,
                oras_image: $oras_image,
                skopeo: $skopeo,
                syft: $syft
              }
            }' >"$EVIDENCE_ROOT/release-manifest.json"

      - name: Attest candidate provenance
        id: provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ env.REGISTRY_DIGEST }}
          subject-version: ${{ env.CANDIDATE_VERSION }}
          push-to-registry: true

      - name: Attest candidate SBOM
        id: sbom-attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ env.REGISTRY_DIGEST }}
          subject-version: ${{ env.CANDIDATE_VERSION }}
          sbom-path: ${{ env.EVIDENCE_ROOT }}/sbom.spdx.json
          push-to-registry: true

      - name: Verify anonymous image and finalize evidence
        shell: bash
        run: |
          set -euo pipefail
          provenance_bundle="${{ steps.provenance.outputs.bundle-path }}"
          provenance_id="${{ steps.provenance.outputs.attestation-id }}"
          provenance_url="${{ steps.provenance.outputs.attestation-url }}"
          sbom_bundle="${{ steps.sbom-attestation.outputs.bundle-path }}"
          sbom_attestation_id="${{ steps.sbom-attestation.outputs.attestation-id }}"
          sbom_attestation_url="${{ steps.sbom-attestation.outputs.attestation-url }}"
          test -s "$provenance_bundle"
          test -s "$sbom_bundle"
          test -n "$provenance_id"
          test -n "$provenance_url"
          test -n "$sbom_attestation_id"
          test -n "$sbom_attestation_url"
          install -m 0644 "$provenance_bundle" "$EVIDENCE_ROOT/provenance.intoto.jsonl"
          install -m 0644 "$sbom_bundle" "$EVIDENCE_ROOT/sbom-attestation.intoto.jsonl"
          jq --slurp --exit-status \
            'length > 0 and all(.[]; has("dsseEnvelope") and has("verificationMaterial"))' \
            "$EVIDENCE_ROOT/provenance.intoto.jsonl" >/dev/null
          jq --slurp --exit-status \
            'length > 0 and all(.[]; has("dsseEnvelope") and has("verificationMaterial"))' \
            "$EVIDENCE_ROOT/sbom-attestation.intoto.jsonl" >/dev/null

          jq --null-input \
            --arg provenance_id "$provenance_id" \
            --arg provenance_url "$provenance_url" \
            --arg sbom_id "$sbom_attestation_id" \
            --arg sbom_url "$sbom_attestation_url" \
            --arg subject "$IMAGE_REPOSITORY@$REGISTRY_DIGEST" \
            '{
              schema: "mtmpg-attestation/v1",
              subject: $subject,
              provenance: {id: $provenance_id, url: $provenance_url},
              sbom: {id: $sbom_id, url: $sbom_url}
            }' \
            >"$EVIDENCE_ROOT/attestation.json"
          provenance_sha256="$(sha256sum "$EVIDENCE_ROOT/provenance.intoto.jsonl" | cut -d' ' -f1)"
          sbom_attestation_sha256="$(sha256sum "$EVIDENCE_ROOT/sbom-attestation.intoto.jsonl" | cut -d' ' -f1)"
          manifest_next="$RUNNER_TEMP/release-manifest.next.json"
          jq \
            --arg provenance_sha256 "$provenance_sha256" \
            --arg sbom_attestation_sha256 "$sbom_attestation_sha256" \
            --arg provenance_id "$provenance_id" \
            --arg provenance_url "$provenance_url" \
            --arg sbom_id "$sbom_attestation_id" \
            --arg sbom_url "$sbom_attestation_url" \
            '. + {
              provenance: {format: "in-toto-jsonl", sha256: $provenance_sha256},
              attestation: {
                provenance: {id: $provenance_id, url: $provenance_url},
                sbom: {id: $sbom_id, url: $sbom_url, sha256: $sbom_attestation_sha256}
              }
            }' \
            "$EVIDENCE_ROOT/release-manifest.json" >"$manifest_next"
          mv "$manifest_next" "$EVIDENCE_ROOT/release-manifest.json"

          anonymous_auth="$RUNNER_TEMP/anonymous-auth.json"
          anonymous_inspect="$RUNNER_TEMP/anonymous-inspect.json"
          printf '{"auths":{}}\n' >"$anonymous_auth"
          anonymous_ready=0
          for _ in $(seq 1 10); do
            if skopeo inspect \
              --authfile "$anonymous_auth" \
              "docker://$IMAGE_REPOSITORY:$CANDIDATE_VERSION" \
              >"$anonymous_inspect" 2>/dev/null; then
              anonymous_ready=1
              break
            fi
            sleep 3
          done
          test "$anonymous_ready" -eq 1
          jq --exit-status \
            --arg digest "$REGISTRY_DIGEST" \
            --arg source "$GITHUB_SHA" \
            --arg version "$CANDIDATE_VERSION" \
            '.Digest == $digest and
             .Labels["org.opencontainers.image.revision"] == $source and
             .Labels["org.opencontainers.image.version"] == $version' \
            "$anonymous_inspect" >/dev/null
          jq --exit-status \
            --arg digest "$REGISTRY_DIGEST" \
            --arg source "$GITHUB_SHA" \
            --arg version "$CANDIDATE_VERSION" \
            '.version == $version and .source == $source and
             .oci.manifest_digest == $digest and
             .oci.registry_digest == $digest' \
            "$EVIDENCE_ROOT/release-manifest.json" >/dev/null

          (
            cd "$EVIDENCE_ROOT"
            sha256sum \
              Cargo.lock \
              resolved-inputs.json \
              candidate-metadata.json \
              release-manifest.json \
              sbom.spdx.json \
              provenance.intoto.jsonl \
              sbom-attestation.intoto.jsonl \
              attestation.json \
              >checksums.txt
            sha256sum --check checksums.txt
          )

      - name: Publish and anonymously verify immutable OCI evidence
        shell: bash
        run: |
          set -euo pipefail
          auth_file="$HOME/.docker/config.json"
          test -f "$auth_file"
          test -f "$EVIDENCE_ROOT/checksums.txt"
          push_result="$(docker run --rm \
            --user "$(id -u):$(id -g)" \
            --workdir /evidence \
            --mount "type=bind,src=$EVIDENCE_ROOT,dst=/evidence,readonly" \
            --mount "type=bind,src=$auth_file,dst=/auth/config.json,readonly" \
            "$ORAS_IMAGE" \
            push \
            --registry-config /auth/config.json \
            --artifact-type application/vnd.codeh007.mtmpg.release-evidence.v1 \
            --annotation "org.opencontainers.image.revision=$GITHUB_SHA" \
            --annotation "org.opencontainers.image.version=$CANDIDATE_VERSION" \
            --format json \
            "$EVIDENCE_REFERENCE" \
            Cargo.lock:application/vnd.codeh007.mtmpg.cargo-lock \
            resolved-inputs.json:application/json \
            candidate-metadata.json:application/json \
            release-manifest.json:application/json \
            sbom.spdx.json:application/spdx+json \
            provenance.intoto.jsonl:application/vnd.in-toto+json \
            sbom-attestation.intoto.jsonl:application/vnd.in-toto+json \
            attestation.json:application/json \
            checksums.txt:text/plain)"
          evidence_digest="$(jq --raw-output '.digest' <<<"$push_result")"
          [[ "$evidence_digest" =~ ^sha256:[0-9a-f]{64}$ ]]

          anonymous_config="$RUNNER_TEMP/anonymous-docker"
          verify_root="$RUNNER_TEMP/evidence-verify"
          install -d -m 0700 "$anonymous_config" "$verify_root"
          printf '{"auths":{}}\n' >"$anonymous_config/config.json"
          anonymous_ready=0
          for _ in $(seq 1 10); do
            rm -f -- "$verify_root"/*
            if docker run --rm \
              --user "$(id -u):$(id -g)" \
              --mount "type=bind,src=$anonymous_config/config.json,dst=/auth/config.json,readonly" \
              --mount "type=bind,src=$verify_root,dst=/verify" \
              "$ORAS_IMAGE" \
              pull \
              --registry-config /auth/config.json \
              --output /verify \
              "$EVIDENCE_REFERENCE" >/dev/null 2>&1; then
              anonymous_ready=1
              break
            fi
            sleep 3
          done
          test "$anonymous_ready" -eq 1
          test "$(docker run --rm \
            --user "$(id -u):$(id -g)" \
            --mount "type=bind,src=$anonymous_config/config.json,dst=/auth/config.json,readonly" \
            "$ORAS_IMAGE" \
            resolve \
            --registry-config /auth/config.json \
            "$EVIDENCE_REFERENCE")" = "$evidence_digest"
          evidence_manifest="$(docker run --rm \
            --user "$(id -u):$(id -g)" \
            --mount "type=bind,src=$anonymous_config/config.json,dst=/auth/config.json,readonly" \
            "$ORAS_IMAGE" \
            manifest fetch \
            --registry-config /auth/config.json \
            "$EVIDENCE_REFERENCE")"
          jq --exit-status \
            --arg artifact_type "application/vnd.codeh007.mtmpg.release-evidence.v1" \
            --arg source "$GITHUB_SHA" \
            --arg version "$CANDIDATE_VERSION" \
            '.artifactType == $artifact_type and
             .annotations["org.opencontainers.image.revision"] == $source and
             .annotations["org.opencontainers.image.version"] == $version' \
            <<<"$evidence_manifest" >/dev/null
          (
            cd "$verify_root"
            sha256sum --check checksums.txt
          )
          jq --exit-status \
            --arg source "$GITHUB_SHA" \
            --arg version "$CANDIDATE_VERSION" \
            --arg digest "$REGISTRY_DIGEST" \
            '.source == $source and .version == $version and
             .oci.registry_digest == $digest' \
            "$verify_root/release-manifest.json" >/dev/null
          echo "EVIDENCE_DIGEST=$evidence_digest" >>"$GITHUB_ENV"

      - name: Upload candidate release evidence
        uses: actions/upload-artifact@v7
        with:
          name: mtmpg-evidence-${{ env.CANDIDATE_VERSION }}
          path: ${{ env.EVIDENCE_ROOT }}/
          if-no-files-found: error
          retention-days: 30
